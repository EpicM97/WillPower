name: HabitTracker
options:
  bundleIdPrefix: com.willpower
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "0.1.0"

targets:
  HabitTracker:
    type: application
    platform: iOS
    configFiles:
      Debug: Sources/HabitTracker/Supabase/Supabase.xcconfig
      Release: Sources/HabitTracker/Supabase/Supabase.xcconfig
    sources:
      - path: Sources/HabitTracker
      - path: Sources/Shared
    dependencies:
      - target: HabitTrackerWidget
      - package: Supabase
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.willpower.HabitTracker
        CODE_SIGN_ENTITLEMENTS: Sources/HabitTracker/HabitTracker.entitlements
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: Sources/HabitTracker/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSSupportsLiveActivities: true
        NSSpeechRecognitionUsageDescription: "WillPower turns your voice into structured habits and tasks."
        NSMicrophoneUsageDescription: "Used to capture your brain-dump for AI parsing."
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        BGTaskSchedulerPermittedIdentifiers:
          - com.willpower.HabitTracker.midnightRollover
        UIBackgroundModes:
          - processing
        CFBundleURLTypes:
          - CFBundleURLName: com.willpower.HabitTracker
            CFBundleURLSchemes:
              - willpower

  HabitTrackerWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/HabitTrackerWidget
      - path: Sources/Shared
      - path: Sources/HabitTracker/Models
      - path: Sources/HabitTracker/Logic
        includes:
          - "HabitSorter.swift"
          - "NextBestActionSelector.swift"
    info:
      path: Sources/HabitTrackerWidget/Info.plist
      properties:
        CFBundleDisplayName: HabitTrackerWidget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.willpower.HabitTracker.Widget
        CODE_SIGN_ENTITLEMENTS: Sources/HabitTrackerWidget/HabitTrackerWidget.entitlements
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: NO
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"

  HabitTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/HabitTrackerTests
    dependencies:
      - target: HabitTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.willpower.HabitTrackerTests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HabitTracker.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/HabitTracker"

schemes:
  HabitTracker:
    build:
      targets:
        HabitTracker: all
        HabitTrackerWidget: all
        HabitTrackerTests: [test]
    test:
      targets:
        - HabitTrackerTests
