name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & test (iOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # Bump to a fixed "26.x" once GitHub runners ship it, to match local.
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Provide placeholder Supabase config
        # The real Supabase.xcconfig is gitignored; tests use mocks, so the
        # committed example (placeholder values) is enough for CI to build.
        run: cp Sources/HabitTracker/Supabase/Supabase.example.xcconfig Sources/HabitTracker/Supabase/Supabase.xcconfig

      - name: Pick an available simulator
        # Don't hardcode "iPhone 17" — use whatever the runner's Xcode ships.
        run: |
          DEVICE=$(xcrun simctl list devices available \
            | grep -E 'iPhone' | head -1 | sed -E 's/ *\(.*//' | xargs)
          echo "Using simulator: $DEVICE"
          echo "DEVICE=$DEVICE" >> "$GITHUB_ENV"

      - name: Build & test
        run: make test DESTINATION="platform=iOS Simulator,name=${DEVICE}"
